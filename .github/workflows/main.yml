name: linting, testing, building
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 20.x ]

    steps:
      # 1. Kodni GitHub'dan yuklab olish (v4 versiyaga yangilandi)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js muhitini sozlash (v4 versiyaga yangilandi)
      - name: Starting Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' # Kutubxonalarni keshlab, pipeline tezligini oshiradi

      # 3. Modullarni o'rnatish
      - name: Install modules
        run: npm ci # 'npm install' o'rniga 'npm ci' tavsiya etiladi (CI muhiti uchun barqaror)

      # 4. Proektni production uchun yig'ish (build:prod)
      - name: Build production project
        run: npm run build:prod

      # 5. Linting tekshiruvi (lint)
      - name: Linting project
        run: npm run lint

      # 6. Unit testlarni ishga tushirish (test)
      - name: Unit testing
        run: npm run test

      # 7. Storybook'ni yig'ish (build-storybook)
      - name: Build storybook
        run: npm run build-storybook